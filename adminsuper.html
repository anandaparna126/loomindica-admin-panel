// ============================================================
//  FETCH WRAPPER — handles auth errors, network errors, toasts
// ============================================================
async function apiFetch(url, options = {}) {
  try {
    const res = await fetch(url, {
      ...options,
      headers: { ...authHeaders(), ...(options.headers || {}) }
    });
    if (res.status === 401 || res.status === 403) {
      showToast('Session expired', 'Please log in again.', 'error');
      setTimeout(() => { window.location.href = 'superadmin-login.html'; }, 1500);
      throw new Error('Unauthorised');
    }
    return res;
  } catch (err) {
    if (err.message !== 'Unauthorised') {
      showToast('Network error', err.message || 'Could not reach server.', 'error');
    }
    throw err;
  }
}

// ============================================================
//  FIELD NORMALISATION HELPERS
//  Django returns snake_case; UI uses camelCase.
// ============================================================
function normaliseAdmin(a) {
  return {
    id:          a.id,
    firstName:   a.first_name  ?? a.firstName  ?? '',
    lastName:    a.last_name   ?? a.lastName   ?? '',
    email:       a.email ?? '',
    phone:       a.phone ?? '',
    role:        a.role  ?? 'viewer',
    permissions: normalisePermissions(a.permissions ?? {}),
    status:      a.status ?? 'active',
    dept:        a.department ?? a.dept ?? '',
    city:        a.city ?? '',
    createdAt:   a.created_at ?? a.createdAt ?? '',
    lastLogin:   a.last_login  ?? a.lastLogin  ?? null,
    loginCount:  a.login_count ?? a.loginCount ?? 0,
  };
}

// Permissions from Django may come as { module: [keys] } or { module: { featureKey: bool } }
function normalisePermissions(raw) {
  const out = {};
  for (const [mod, val] of Object.entries(raw)) {
    if (Array.isArray(val)) {
      out[mod] = val;
    } else if (typeof val === 'object' && val !== null) {
      out[mod] = Object.entries(val).filter(([,v]) => v).map(([k]) => k);
    } else {
      out[mod] = [];
    }
  }
  return out;
}

// camelCase payload → snake_case for Django
function toSnake(obj) {
  const map = {
    firstName:'first_name', lastName:'last_name',
    isActive:'is_active', sendCredentials:'send_credentials',
    forceReset:'force_reset',
  };
  const out = {};
  for (const [k, v] of Object.entries(obj)) out[map[k] ?? k] = v;
  return out;
}

function showSection(name) {
  sections.forEach(s => document.getElementById('sec-'+s).classList.add('hidden'));
  document.getElementById('sec-'+name)?.classList.remove('hidden');
  document.getElementById('topbarTitle').textContent = sectionTitles[name] || name;
  document.querySelectorAll('.sidebar .nav-link').forEach(l =>
    l.classList.toggle('active', l.getAttribute('onclick')?.includes("'"+name+"'"))
  );
  if (name === 'dashboard')     loadDashboard();
  if (name === 'admins')        loadAndRenderAdmins();
  if (name === 'activity-log')  loadActivityLog();
  if (name === 'create-admin')  { resetAdminForm(); renderCreatePermModules(); }
}

async function loadDashboard() {
  try {
    const stats = await SA_API.getStats();
    document.getElementById('statAdmins').textContent    = stats.totalAdmins;
    document.getElementById('statOrders').textContent    = stats.totalOrders.toLocaleString('en-IN');
    document.getElementById('statRevenue').textContent   = '₹'+(stats.totalRevenue/100000).toFixed(2)+'L';
    document.getElementById('statProducts').textContent  = stats.totalProducts;
    document.getElementById('statAdminsChg').textContent = ADMINS_CACHE.length + ' total accounts';
    document.getElementById('statOrdersChg').textContent = '↑ vs last month';
    document.getElementById('statRevenueChg').textContent= '↑ vs last month';
    document.getElementById('statProductsChg').textContent = 'updated';
  } catch { /* toast already shown */ }

  try {
    const admins = await SA_API.getAdmins();
    ADMINS_CACHE = admins;
    document.getElementById('adminCountBadge').textContent = admins.length;
    renderDashAdminList();
  } catch { /* toast already shown */ }

  renderCharts();
  const hr = new Date().getHours();
  document.getElementById('greetMsg').textContent =
    `${hr<12?'Good morning':hr<17?'Good afternoon':'Good evening'}! Here's your system overview.`;
  
  // Load recent activity for dashboard
  try {
    const logs = await SA_API.getActivityLog();
    ACTIVITY_LOG = logs;
    renderDashActivity();
  } catch { /* non-critical, ignore */ }
}

  list.innerHTML = ADMINS_CACHE.slice(0,5).map(a => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);">
      <div class="admin-avatar" style="background:${avatarColor(a.id)};">${a.firstName[0]||'?'}${a.lastName[0]||'?'}</div>
      <div style="flex:1;min-width:0;">

}

function renderAdminsTable() {
  const search  = document.getElementById('adminSearch')?.value.toLowerCase() || '';
  const roleF   = document.getElementById('roleFilter')?.value || '';
  const statusF = document.getElementById('statusFilter')?.value || '';

  const filtered = ADMINS_CACHE.filter(a => {
    const matchName = (a.firstName+' '+a.lastName).toLowerCase().includes(search) || a.email.toLowerCase().includes(search);
    return (!search || matchName) && (!roleF || a.role===roleF) && (!statusF || a.status===statusF);

  const tbody = document.getElementById('adminsTableBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">No admins found.</td></tr>`;

  }

  tbody.innerHTML = filtered.map(a => {
    // ── BUG FIX: count unique feature keys across all modules ──
    // The old code counted raw array lengths which could add up > actual feature total
    // because one feature key might appear in multiple checked checkboxes (view+edit).
    // Correct approach: count distinct feature keys that appear in permissions.
    const allGrantedKeys = new Set();
    Object.values(a.permissions || {}).forEach(arr => (arr||[]).forEach(k => allGrantedKeys.add(k)));

    return `
    <tr>

            <div style="font-size:11px;color:var(--text-muted);">${a.dept||'—'} · ${a.city||'—'}</div>
          </div>
        </div>
      </td>
      <td style="font-size:12px;">${a.email}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${a.phone}</td>
      <td>
        <span class="badge badge-primary">${a.role}</span>
        <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${totalPerms} permissions</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge ${a.status==='active'?'badge-success':'badge-secondary'}">${a.status}</span>
          <label class="toggle-switch" title="Toggle Status">
            <input type="checkbox" ${a.status==='active'?'checked':''} onchange="toggleStatus(${a.id},this)">
            <div class="toggle-slider"></div>
          </label>
        </div>
      </td>
      <td style="font-size:12px;color:var(--text-secondary);">${formatDate(a.createdAt)}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${a.lastLogin?formatDate(a.lastLogin):'<span style="color:var(--text-muted);">Never</span>'}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm btn-secondary" title="Edit" onclick="openEditAdmin(${a.id})"><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-sm btn-danger" title="Delete" onclick="openDeleteAdmin(${a.id},'${(a.firstName+' '+a.lastName).replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function toggleStatus(id, checkbox) {
  const prev = checkbox.checked;
  checkbox.disabled = true;
  try {
    const result = await SA_API.toggleAdminStatus(id);
    const admin = ADMINS_CACHE.find(a => a.id === id);
    if (admin) admin.status = result.status;
    showToast('Status updated', `Admin is now ${result.status}.`, 'success');
    renderAdminsTable();
  } catch {
    checkbox.checked = !prev; // revert on error
  } finally {
    checkbox.disabled = false;
  }
}

// ============================================================
//  GRANULAR PERMISSION RENDER — BUG FIX
//
//  ROOT CAUSE of the "granted > total" bug:
//  Each feature has cols like ['view','edit']. When a feature
//  is checked, ALL cols render a checked checkbox. The old
//  summary counted every checked <input> independently, so
//  a feature with 2 cols counted as 2 even though it is ONE
//  feature. Fix: count distinct feature KEYS, not checkboxes.
// ============================================================
function renderCreatePermModules(granted = {}) {
  const container = document.getElementById('createPermModules');
  if (!container) return;
  container.innerHTML = '';
  MODULES.forEach(mod => {
    const grantedKeys = granted[mod.key] || [];
    const totalFeatures  = mod.features.length;
    // Count unique features that have AT LEAST ONE granted col
    const grantedFeatureCount = mod.features.filter(f => grantedKeys.includes(f.key)).length;
    const allGranted = grantedFeatureCount === totalFeatures;

    const block = document.createElement('div');
    block.className = 'perm-module-block';
    block.id = `cmod_${mod.key}`;
    block.innerHTML = `
      <div class="perm-module-header" onclick="toggleCreateModule('${mod.key}')">
        <span class="perm-module-icon">${mod.icon}</span>
        <span class="perm-module-name">${mod.name}</span>
        <span class="perm-module-summary" id="csummary_${mod.key}">${grantedFeatureCount}/${totalFeatures} features</span>
        <label class="toggle-switch small" onclick="event.stopPropagation()">
          <input type="checkbox" id="cmaster_${mod.key}" ${allGranted?'checked':''}
            onchange="masterToggleCreate('${mod.key}',this.checked)">
          <div class="toggle-slider"></div>
        </label>
        <i class="fa-solid fa-chevron-right perm-chevron"></i>
      </div>
      <div class="perm-module-body">
        <table class="perm-table">
          <thead><tr>
            <th>Feature</th>
            <th class="col-view">View</th>
            <th class="col-create">Create</th>
            <th class="col-edit">Edit</th>
            <th class="col-delete">Delete</th>
            <th class="col-export">Export</th>
          </tr></thead>
          <tbody>
            ${mod.features.map(f => `
              <tr>
                <td><div class="perm-feature-name">${f.name}</div><div class="perm-feature-desc">${f.desc}</div></td>
                ${['view','create','edit','delete','export'].map(col => `
                  <td>${f.cols.includes(col)
                    ? `<input type="checkbox" class="perm-check col-${col}"
                         data-module="${mod.key}" data-key="${f.key}" data-col="${col}"
                         ${grantedKeys.includes(f.key)?'checked':''}
                         onchange="onCreatePermChange('${mod.key}')">`
                    : `<span style="color:var(--border);font-size:12px;">—</span>`
                  }</td>`).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
        <div class="perm-table-footer">
          <label class="check-all-row" onclick="grantAllInCreateModule('${mod.key}',true)">
            <i class="fa-solid fa-check-double"></i> Grant all
          </label>
          <label class="check-all-row" style="margin-left:12px;" onclick="grantAllInCreateModule('${mod.key}',false)">
            <i class="fa-solid fa-xmark"></i> Revoke all
          </label>
        </div>
      </div>`;
    container.appendChild(block);
  });
  updateCreateSummary();
}

function toggleCreateModule(key) {
  document.getElementById(`cmod_${key}`)?.classList.toggle('expanded');
}

function expandAllCreate() {
  document.querySelectorAll('#createPermModules .perm-module-block').forEach(b => b.classList.add('expanded'));
}

function masterToggleCreate(moduleKey, checked) {
  const mod = MODULES.find(m => m.key === moduleKey);
  mod?.features.forEach(f => {
    document.querySelectorAll(`#createPermModules input.perm-check[data-module="${moduleKey}"][data-key="${f.key}"]`)
      .forEach(cb => cb.checked = checked);
  });
  updateCreateModuleSummary(moduleKey);
  updateCreateSummary();
}

function grantAllInCreateModule(moduleKey, grant) {
  masterToggleCreate(moduleKey, grant);
  const master = document.getElementById(`cmaster_${moduleKey}`);
  if (master) master.checked = grant;
}

function onCreatePermChange(moduleKey) {
  updateCreateModuleSummary(moduleKey);
  updateCreateSummary();
}

// ── KEY FIX: count by unique feature key, not by checkbox count ──
function updateCreateModuleSummary(moduleKey) {
  const mod = MODULES.find(m => m.key === moduleKey);
  if (!mod) return;
  const totalFeatures = mod.features.length;
  // A feature is "granted" if at least one of its col-checkboxes is checked
  const grantedFeatures = mod.features.filter(f => {
    return !!document.querySelector(
      `#createPermModules input.perm-check[data-module="${moduleKey}"][data-key="${f.key}"]:checked`
    );
  }).length;

  const el = document.getElementById(`csummary_${moduleKey}`);
  if (el) el.textContent = `${grantedFeatures}/${totalFeatures} features`;

  const master = document.getElementById(`cmaster_${moduleKey}`);
  if (master) master.checked = grantedFeatures === totalFeatures && totalFeatures > 0;
}

// ── KEY FIX: summary counts features, not raw checkbox ticks ──
function updateCreateSummary() {
  const lines = [];
  MODULES.forEach(mod => {
    const totalFeatures = mod.features.length;
    const grantedFeatures = mod.features.filter(f =>
      !!document.querySelector(
        `#createPermModules input.perm-check[data-module="${mod.key}"][data-key="${f.key}"]:checked`
      )
    ).length;
    if (grantedFeatures > 0) {
      lines.push(`${mod.icon} <strong>${mod.name}</strong>: ${grantedFeatures}/${totalFeatures}`);
    }
  });
  const el = document.getElementById('createPermSummary');
  if (el) el.innerHTML = lines.length
    ? lines.join(' &nbsp;·&nbsp; ')
    : '<span style="color:var(--text-muted);">No permissions granted yet.</span>';
}

function setCreatePerms(grant) {
  MODULES.forEach(mod => {
    mod.features.forEach(f => {
      document.querySelectorAll(`#createPermModules input.perm-check[data-key="${f.key}"]`)
        .forEach(cb => cb.checked = grant);
    });
    updateCreateModuleSummary(mod.key);
    const master = document.getElementById(`cmaster_${mod.key}`);
    if (master) master.checked = grant;
  });
  updateCreateSummary();
}

// Collect permissions as { module: [featureKey, ...] }
// Only includes a feature key once, even if multiple cols are checked
function collectCreatePermissions() {
  const perms = {};
  MODULES.forEach(mod => {
    const granted = mod.features
      .filter(f => !!document.querySelector(
        `#createPermModules input.perm-check[data-module="${mod.key}"][data-key="${f.key}"]:checked`
      ))
      .map(f => f.key);
    if (granted.length) perms[mod.key] = granted;
  });
  return perms;
}

function checkPasswordStrength() {
  const pwd = document.getElementById('adminPassword').value;
  const rules = { length: pwd.length>=8, upper:/[A-Z]/.test(pwd), number:/[0-9]/.test(pwd), special:/[^A-Za-z0-9]/.test(pwd) };
  document.querySelectorAll('.pwd-check').forEach(el => {
    const rule = el.dataset.rule;
    el.style.color = rules[rule] ? 'var(--success)' : 'var(--text-muted)';
    el.textContent = (rules[rule]?'✓ ':'✗ ') + el.textContent.replace(/^[✓✗]\s/,'');
  });
  const score = Object.values(rules).filter(Boolean).length;
  const colors = ['','var(--danger)','var(--warning)','#d4a017','var(--success)'];
  const labels = ['','Weak','Fair','Good','Strong'];
  document.getElementById('pwdStrengthFill').style.cssText =
    `width:${score*25}%;background:${colors[score]};height:100%;border-radius:10px;transition:var(--transition);`;
  document.getElementById('pwdStrengthText').textContent =
    score > 0 ? labels[score]+' password' : 'Enter password to check strength';
}

let editingAdminId = null;
let deleteAdminId  = null;

async function submitAdminForm() {
  const firstName = document.getElementById('adminFirstName').value.trim();
  const lastName  = document.getElementById('adminLastName').value.trim();
  const email     = document.getElementById('adminEmail').value.trim();
  const phone     = document.getElementById('adminPhone').value.trim();
  const password  = document.getElementById('adminPassword').value;
  const confirmPwd= document.getElementById('adminPasswordConfirm').value;
  const role      = document.getElementById('adminRole').value;

  if (!firstName||!lastName)  { showToast('Missing field','Please enter first and last name.','error'); return; }
  if (!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Invalid email','Please enter a valid email.','error'); return; }
  if (!phone||phone.length<10){ showToast('Invalid phone','Please enter a valid 10-digit phone.','error'); return; }
  if (!role)                  { showToast('Missing field','Please select a role.','error'); return; }
  if (!editingAdminId) {
    if (!password)            { showToast('Missing field','Please enter a password.','error'); return; }
    if (password!==confirmPwd){ showToast('Password mismatch','Passwords do not match.','error'); return; }
    if (password.length<8)    { showToast('Weak password','Password must be at least 8 characters.','error'); return; }
  }

  const permissions = collectCreatePermissions();
  const btn = document.getElementById('createAdminBtn');
  btn.disabled = true;
  const origHTML = btn.innerHTML;
  btn.innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;"></div> Saving…';

  try {
    const payload = {
      firstName, lastName, email, phone, role, permissions,
      dept:            document.getElementById('adminDept').value,
      city:            document.getElementById('adminCity').value,
      isActive:        document.getElementById('adminActive').checked,
      sendCredentials: document.getElementById('sendCredentials').checked,
      forceReset:      document.getElementById('forceReset').checked,
      ...(password && { password }),
    };

    if (editingAdminId) {
      // EDIT path — reached via showSection('create-admin') after openEditAdmin
      await SA_API.updateAdmin(editingAdminId, payload);
      showToast('Admin updated! ✅', `${firstName} ${lastName} has been updated.`, 'success');
    } else {
      // CREATE path
      const result = await SA_API.createAdmin(payload);
      if (!result.success) throw new Error(result.message || 'Failed');
      showToast('Admin created! 🎉', `${firstName} ${lastName} can now log in.`, 'success');
    }
    // Refresh cache & navigate back
    ADMINS_CACHE = await SA_API.getAdmins().catch(() => ADMINS_CACHE);
    document.getElementById('adminCountBadge').textContent = ADMINS_CACHE.length;
    setTimeout(() => showSection('admins'), 1200);
  } catch (err) {
    showToast('Error', err.message || 'Server error.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHTML;
  }
}

}

//  DELETE ADMIN
// ============================================================
function openDeleteAdmin(id, name) {
  deleteAdminId = id;
  document.getElementById('deleteAdminName').textContent = name;
  openModal('deleteAdminModal');
}

document.getElementById('confirmDeleteAdminBtn').addEventListener('click', async () => {
  if (!deleteAdminId) return;
  const btn = document.getElementById('confirmDeleteAdminBtn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    await SA_API.deleteAdmin(deleteAdminId);
    ADMINS_CACHE = ADMINS_CACHE.filter(a => a.id !== deleteAdminId);
    closeModal('deleteAdminModal');
    showToast('Admin deleted', 'Admin account removed.', 'success');
    document.getElementById('adminCountBadge').textContent = ADMINS_CACHE.length;
    renderAdminsTable();
  } catch { /* toast already shown */ }
  finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-trash"></i> Delete';
    deleteAdminId = null;
  }
});

// ============================================================
//  ACTIVITY LOG
// ============================================================
async function loadActivityLog() {
  document.getElementById('activityLogBody').innerHTML =
    '<tr><td colspan="6" style="text-align:center;padding:40px;"><div class="spinner" style="margin:auto;"></div></td></tr>';
  try {
    const logs = await SA_API.getActivityLog();
    ACTIVITY_LOG = logs;
    document.getElementById('activityLogBody').innerHTML = logs.map(l => `
      <tr>
        <td style="font-size:11px;color:var(--text-muted);white-space:nowrap;">${new Date(l.time).toLocaleString('en-IN')}</td>
        <td style="font-weight:600;">${l.actor}</td>
        <td><span class="badge ${l.role==='superadmin'?'badge-gold':l.role==='admin'?'badge-primary':'badge-secondary'}">${l.role}</span></td>
        <td>${l.action}</td>
        <td style="font-size:12px;color:var(--text-secondary);">${l.details}</td>
        <td style="font-size:11px;font-family:monospace;color:var(--text-muted);">${l.ip}</td>
      </tr>`).join('');
  } catch {
    document.getElementById('activityLogBody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Could not load activity log.</td></tr>';
  }
}

// ============================================================
//  ROLES & PERMISSIONS PAGE
// ============================================================
function switchRolesTab(tab, btn) {
  ['overview','matrix','custom'].forEach(t => document.getElementById(`rtab-${t}`)?.classList.add('hidden'));
  document.querySelectorAll('.pill-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`rtab-${tab}`)?.classList.remove('hidden');
  if (btn) btn.classList.add('active');
  if (tab === 'matrix') renderMatrix();
  if (tab === 'custom') { renderCustomPerms(); renderAssignCustomPerms(); }
}

function renderMatrix() {
  const tbody = document.getElementById('matrixBody');
  tbody.innerHTML = '';
  MODULES.forEach(mod => {
    const gr = tbody.insertRow();
    gr.className = 'module-group-row';
    gr.innerHTML = `<td colspan="5">${mod.icon} ${mod.name}</td>`;
    mod.features.forEach(f => {
      const tr = tbody.insertRow();
      tr.innerHTML = `
        <td class="feature-indent">${f.name}</td>
        <td><i class="fa-solid fa-check check-icon"></i></td>
        ${['admin','manager','viewer'].map(role => {
          const ok = (ROLE_DEFAULTS[role][mod.key] || []).includes(f.key);
          return ok
            ? `<td><i class="fa-solid fa-check check-icon"></i></td>`
            : `<td><i class="fa-solid fa-minus cross-icon"></i></td>`;
        }).join('')}`;
    });
  });
}

function editRole(role) {
  document.getElementById('editRoleTitle').textContent = `Edit Permissions — ${role.charAt(0).toUpperCase()+role.slice(1)}`;
  const body = document.getElementById('editRoleBody');
  body.innerHTML = `
    <div class="alert alert-warning">
      <i class="fa-solid fa-triangle-exclamation"></i>
      Changes here update the DEFAULT permissions for ALL new admins with this role. Existing admins are not affected.
    </div>
    <div id="roleEditModules"></div>`;
  const container = document.getElementById('roleEditModules');
  const granted = ROLE_DEFAULTS[role] || {};
  MODULES.forEach(mod => {
    const grantedKeys = granted[mod.key] || [];
    const block = document.createElement('div');
    block.className = 'perm-module-block mb-12 expanded';
    block.innerHTML = `
      <div class="perm-module-header" onclick="this.parentElement.classList.toggle('expanded')">
        <span class="perm-module-icon">${mod.icon}</span>
        <span class="perm-module-name">${mod.name}</span>
        <i class="fa-solid fa-chevron-right perm-chevron"></i>
      </div>
      <div class="perm-module-body">
        ${mod.features.map(f => `
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;">
            <input type="checkbox" class="perm-check col-view"
              data-role="${role}" data-mod="${mod.key}" data-fkey="${f.key}"
              ${grantedKeys.includes(f.key)?'checked':''}>
            <div>
              <div style="font-weight:500;">${f.name}</div>
              <div style="font-size:11px;color:var(--text-muted);">${f.desc}</div>
            </div>
          </label>`).join('')}
      </div>`;
    container.appendChild(block);
  });
  openModal('editRoleModal');
}

async function saveRolePerms() {
  const checks = document.querySelectorAll('#roleEditModules input[type=checkbox]');
  const role = checks[0]?.dataset.role;
  if (!role) return;
  const newPerms = {};
  checks.forEach(cb => {
    const { mod, fkey } = cb.dataset;
    if (!newPerms[mod]) newPerms[mod] = [];
    if (cb.checked) newPerms[mod].push(fkey);
  });
  try {
    await SA_API.saveRolePermissions(role, newPerms);
    closeModal('editRoleModal');
    renderMatrix();
    showToast('Role permissions saved', 'Default permissions updated for new admins.', 'success');
  } catch { /* toast already shown */ }
}

// ============================================================
//  CUSTOM PERMISSIONS
// ============================================================
function renderCustomPerms() {
  const list = document.getElementById('customPermList');
  if (!list) return;
  if (!CUSTOM_PERMS.length) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:12px;">No custom permissions yet. Click Add to create one.</div>';
    return;
  }
  list.innerHTML = '';
  CUSTOM_PERMS.forEach((p, i) => {
    const riskBadge = {low:'<span class="badge badge-green">Low</span>',medium:'<span class="badge badge-amber">Medium</span>',high:'<span class="badge badge-red">High</span>'}[p.risk];
    const item = document.createElement('div');
    item.className = 'custom-perm-item';
    item.innerHTML = `
      <div class="custom-perm-item-icon">${p.icon||'🔑'}</div>
      <div class="custom-perm-item-info">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="custom-perm-item-name">${p.name}</span>
          <span class="custom-perm-item-key">${p.key}</span>
          ${riskBadge}
        </div>
        <div class="custom-perm-item-meta">${p.desc}${p.module?` · Module: ${p.module}`:''} · Roles: ${p.roles.join(', ')||'none'}</div>
      </div>
      <div class="custom-perm-actions">
        <button class="btn btn-xs btn-secondary" onclick="editCustomPerm(${i})"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-xs btn-danger-soft" onclick="deleteCustomPerm(${i})"><i class="fa-solid fa-trash"></i></button>
      </div>`;
    list.appendChild(item);
  });
}

function renderAssignCustomPerms() {
  const container = document.getElementById('assignCustomPerms');
  if (!container) return;
  container.innerHTML = '';
  ['admin','manager','viewer'].forEach(role => {
    const div = document.createElement('div');
    div.style.marginBottom = '16px';
    div.innerHTML = `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:8px;">${role==='admin'?'🛠️':role==='manager'?'🗂️':'👁️'} ${role.charAt(0).toUpperCase()+role.slice(1)}</div>`;
    if (!CUSTOM_PERMS.length) { div.innerHTML += '<div style="font-size:12px;color:var(--text-muted);">No custom permissions yet.</div>'; }
    CUSTOM_PERMS.forEach(p => {
      const checked = (p.roles||[]).includes(role);
      const row = document.createElement('label');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;cursor:pointer;';
      row.innerHTML = `<input type="checkbox" ${checked?'checked':''} onchange="toggleCustomPermRole('${p.key}','${role}',this.checked)"> <span>${p.icon||'🔑'} ${p.name}</span> <span class="custom-perm-item-key" style="font-size:10px;">${p.key}</span>`;
      div.appendChild(row);
    });
    container.appendChild(div);
  });
}

function toggleCustomPermRole(permKey, role, checked) {
  const perm = CUSTOM_PERMS.find(p => p.key === permKey);
  if (!perm) return;
  if (checked && !perm.roles.includes(role)) perm.roles.push(role);
  if (!checked) perm.roles = perm.roles.filter(r => r !== role);
  showToast('Updated', `${permKey} assignment changed.`, 'success');
}

async function deleteCustomPerm(i) {
  if (!confirm(`Delete permission "${CUSTOM_PERMS[i].name}"? This will revoke it from all admins.`)) return;
  const key = CUSTOM_PERMS[i].key;
  try {
    await SA_API.deleteCustomPermission(key);
    CUSTOM_PERMS.splice(i, 1);
    renderCustomPerms();
    renderAssignCustomPerms();
    showToast('Permission deleted', '', 'success');
  } catch { /* toast */ }
}

function editCustomPerm(i) {
  const p = CUSTOM_PERMS[i];
  document.getElementById('newPermName').value   = p.name;
  document.getElementById('newPermKey').value    = p.key;
  document.getElementById('newPermModule').value = p.module || '';
  document.getElementById('newPermIcon').value   = p.icon || '';
  document.getElementById('newPermRisk').value   = p.risk || 'low';
  document.getElementById('newPermDesc').value   = p.desc || '';
  document.getElementById('grantAdmin').checked   = (p.roles||[]).includes('admin');
  document.getElementById('grantManager').checked = (p.roles||[]).includes('manager');
  document.getElementById('grantViewer').checked  = (p.roles||[]).includes('viewer');
  openModal('addPermModal');
}

async function saveCustomPerm() {
  const name = document.getElementById('newPermName').value.trim();
  const key  = document.getElementById('newPermKey').value.trim();
  if (!name||!key) { showToast('Required fields missing','Name and Key are required.','error'); return; }
  const roles = [];
  if (document.getElementById('grantAdmin').checked)   roles.push('admin');
  if (document.getElementById('grantManager').checked) roles.push('manager');
  if (document.getElementById('grantViewer').checked)  roles.push('viewer');
  const perm = {
    name, key,
    icon:   document.getElementById('newPermIcon').value.trim() || '🔑',
    module: document.getElementById('newPermModule').value,
    risk:   document.getElementById('newPermRisk').value,
    desc:   document.getElementById('newPermDesc').value.trim(),
    roles
  };
  try {
    await SA_API.saveCustomPermission(perm);
    const existing = CUSTOM_PERMS.findIndex(p => p.key === key);
    if (existing >= 0) CUSTOM_PERMS[existing] = perm; else CUSTOM_PERMS.push(perm);
    renderCustomPerms();
    renderAssignCustomPerms();
    closeModal('addPermModal');
    showToast(`Permission "${name}" saved`, '', 'success');
  } catch { /* toast */ }
}

// ============================================================
//  UTILITIES
// ============================================================
function openModal(id) { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

function showToast(title, msg='', type='success') {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const tc = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span style="font-size:18px;">${icons[type]||'ℹ️'}</span><div><div style="font-size:13px;font-weight:600;">${title}</div>${msg?`<div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${msg}</div>`:''}</div>`;
  tc.appendChild(toast);
  setTimeout(() => toast.remove(), 4200);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}

function timeAgo(d) {
  if (!d) return '—';
  const diff = Date.now() - new Date(d).getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 1)   return 'Just now';
  if (mins < 60)  return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24)   return `${hrs}h ago`;
  return formatDate(d);
}

function avatarColor(id) {
  const c = ['#2d6a4f','#3182ce','#805ad5','#b7791f','#e53e3e','#dd6b20','#38a169'];
  return c[id % c.length];
}

function logout() {
  localStorage.removeItem('superAdminToken');
  localStorage.removeItem('superAdminData');
  window.location.href = 'superadmin-login.html';
}

  const sidebar = document.getElementById('sidebar');
  const main    = document.getElementById('mainContent');
  sidebar.classList.toggle('collapsed');
  main.classList.toggle('expanded', sidebar.classList.contains('collapsed'));
});
